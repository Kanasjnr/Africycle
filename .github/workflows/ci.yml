name: CI/CD Pipeline

on:
  push:
    branches: [ main, staging, testing ]
  pull_request:
    branches: [ main, staging, testing ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      hardhat: ${{ steps.filter.outputs.hardhat }}
      react: ${{ steps.filter.outputs.react }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hardhat:
              - 'packages/hardhat/**'
              - 'yarn.lock'
            react:
              - 'packages/react-app/**'
              - 'yarn.lock'

  blockchain:
    name: ⛓️ Smart Contracts
    needs: changes
    if: needs.changes.outputs.hardhat == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: 📦 Install Dependencies
        run: yarn install --frozen-lockfile

      - name: 🧪 Run Tests & Coverage
        run: yarn workspace @africycle/hardhat coverage
        env:
          REPORT_GAS: true

  # FRONTEND GATE
  frontend:
    name: ⚛️ Frontend
    needs: changes
    if: needs.changes.outputs.react == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Linting
        run: yarn workspace @africycle/react-app lint

      - name: Unit Tests
        run: yarn workspace @africycle/react-app test --watchAll=false
        env:
          CI: true
          NEXT_PUBLIC_CELO_NETWORK: mainnet

      - name: Build Verification
        run: yarn workspace @africycle/react-app build
        env:
          NEXT_PUBLIC_CELO_NETWORK: mainnet
          NEXT_PUBLIC_CONTRACT_ADDRESS: "0x272e893d6F50c93bA12554693435b8C391528553"
          CI: true